name: roamsafe
description: "RoamSafe - Personal Safety Emergency Alert App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.2.0

  # Networking & API
  dio: ^5.4.3
  retrofit: ^4.1.0
  json_annotation: ^4.9.0

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Location
  geolocator: ^11.0.0
  google_maps_flutter: ^2.6.0

  # Sensors (Shake Detection)
  sensors_plus: ^4.0.2

  # Notifications & Background
  flutter_local_notifications: ^17.1.2
  workmanager: ^0.5.2

  # Audio (Alarm)
  just_audio: ^0.9.38
  audio_session: ^0.1.21

  # Phone / Calling
  url_launcher: ^6.2.5

  # Permissions
  permission_handler: ^11.3.1

  # Image Handling
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # UI / UX
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  carousel_slider: ^4.2.1
  pin_code_fields: ^8.0.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  path_provider: ^2.1.3
  logger: ^2.3.0
  get_it: ^7.7.0
  injectable: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/audio/
